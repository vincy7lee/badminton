/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
function uid() { return Math.random().toString(36).slice(2, 9); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pKey(a, b) { return [a, b].sort().join("||"); }
function mGet(m, a, b) { return m[pKey(a, b)] || 0; }
function mInc(m, a, b) { m[pKey(a, b)] = mGet(m, a, b) + 1; }
function baseId(id) { return id.split("__bx")[0]; }
function teamSkill(team) {
  return team.reduce((s, p) => s + (p.skill ?? 5), 0) / team.length;
}

/* ═══════════════════════════════════════════════════════════
   MATCH GENERATION
═══════════════════════════════════════════════════════════ */
function genMixed(males, females) {
  let M = [...males], F = [...females];
  const n = Math.max(M.length, F.length);
  // More females than males → borrow females to fill male slots
  while (M.length < n) {
    const src = females[M.length % females.length];
    M.push({ ...src, id: src.id + "__bx" + M.length, borrowed: true });
  }
  // More males than females → borrow males to fill female slots
  while (F.length < n) {
    const src = males[F.length % males.length];
    F.push({ ...src, id: src.id + "__bx" + F.length, borrowed: true });
  }
  const teams = [];
  for (const m of M) for (const f of F) {
    if (baseId(m.id) !== baseId(f.id)) teams.push([m, f]);
  }
  const matches = [];
  for (let i = 0; i < teams.length; i++)
    for (let j = i + 1; j < teams.length; j++) {
      const bases = [...teams[i], ...teams[j]].map(p => baseId(p.id));
      if (new Set(bases).size === 4)
        matches.push({ teamA: teams[i], teamB: teams[j] });
    }
  return matches;
}

function genDoubles(players) {
  const teams = [];
  for (let i = 0; i < players.length; i++)
    for (let j = i + 1; j < players.length; j++)
      teams.push([players[i], players[j]]);
  const matches = [];
  for (let i = 0; i < teams.length; i++)
    for (let j = i + 1; j < teams.length; j++) {
      const ids = [...teams[i], ...teams[j]].map(p => p.id);
      if (new Set(ids).size === 4)
        matches.push({ teamA: teams[i], teamB: teams[j] });
    }
  return matches;
}

function genSingles(players) {
  const matches = [];
  for (let i = 0; i < players.length; i++)
    for (let j = i + 1; j < players.length; j++)
      matches.push({ teamA: [players[i]], teamB: [players[j]] });
  return matches;
}

function getAllMatches(mode, males, females) {
  switch (mode) {
    case "mixed":           return genMixed(males, females);
    case "mens_doubles":    return genDoubles(males);
    case "womens_doubles":  return genDoubles(females);
    case "mens_singles":    return genSingles(males);
    case "womens_singles":  return genSingles(females);
    default: return [];
  }
}

/* ═══════════════════════════════════════════════════════════
   SCHEDULING ALGORITHMS
═══════════════════════════════════════════════════════════ */
function novelty(match, opposed, teamed) {
  const ap = match.teamA.map(p => baseId(p.id));
  const bp = match.teamB.map(p => baseId(p.id));
  let s = 0;
  if (ap.length === 2) s += Math.max(0, 5 - mGet(teamed, ap[0], ap[1]));
  if (bp.length === 2) s += Math.max(0, 5 - mGet(teamed, bp[0], bp[1]));
  for (const a of ap) for (const b of bp) s += Math.max(0, 5 - mGet(opposed, a, b));
  return s;
}

// games played per base-player id
function makeGameCount() { return {}; }
function gcGet(gc, id) { return gc[baseId(id)] || 0; }
function gcInc(gc, ids) { ids.forEach(id => { const b = baseId(id); gc[b] = (gc[b]||0)+1; }); }

// Total games load of all players in a match
function loadScore(match, gc) {
  return [...match.teamA, ...match.teamB].reduce((s, p) => s + gcGet(gc, p.id), 0);
}

// Max games any single player in this match has played
function maxLoad(match, gc) {
  return Math.max(...[...match.teamA, ...match.teamB].map(p => gcGet(gc, p.id)));
}

// Gender imbalance penalty: in mixed doubles, prefer matches where the
// gender with fewer total games gets to play. Returns higher = worse imbalance.
function genderImbalance(match, gc) {
  const players = [...match.teamA, ...match.teamB];
  const males   = players.filter(p => p.gender === "M");
  const females = players.filter(p => p.gender === "F");
  if (!males.length || !females.length) return 0; // not mixed, no penalty
  const avgM = males.reduce((s, p) => s + gcGet(gc, p.id), 0) / males.length;
  const avgF = females.reduce((s, p) => s + gcGet(gc, p.id), 0) / females.length;
  return Math.abs(avgM - avgF);
}

// Hard cap: no player may exceed targetGames + 5
function exceedsHardCap(match, gc, target) {
  const cap = target + 5;
  return [...match.teamA, ...match.teamB].some(p => gcGet(gc, p.id) >= cap);
}

// Unique key for a match by its 4 base player ids (order-independent)
function matchFingerprint(match) {
  return [...match.teamA, ...match.teamB].map(p => baseId(p.id)).sort().join("|");
}

// Priority order: 1→hard cap (filter), 3→loadScore, 4→novelty, 2→maxLoad
// Higher return value = schedule sooner
function matchPriority(match, opposed, teamed, gc) {
  const ls  = loadScore(match, gc);            // #3 — spread total games broadly
  const nov = novelty(match, opposed, teamed); // #4 — fresh pairings
  const ml  = maxLoad(match, gc);              // #2 — individual max last
  return -ls * 100000000 + nov * 10000 - ml;
}

function runSchedule(allMatches, targetGames, sortFn) {
  const remaining = [...allMatches];
  const rounds = [];
  const opposed = {}, teamed = {}, gc = makeGameCount();
  const played = new Set();

  while (remaining.length > 0) {
    // Remove exact duplicates and hard-cap violations from candidate pool
    const eligible = remaining.filter(m =>
      !played.has(matchFingerprint(m)) && !exceedsHardCap(m, gc, targetGames)
    );
    if (eligible.length === 0) break;

    sortFn(eligible, opposed, teamed, gc, targetGames);

    const used = new Set(), round = [], playedSet = new Set();

    // Pass 1: prefer players who haven't hit soft target yet (target+1 threshold)
    for (const m of eligible) {
      const ids = [...m.teamA, ...m.teamB].map(p => p.id);
      if (ids.every(id => !used.has(id))) {
        if (ids.some(id => gcGet(gc, id) >= targetGames + 1)) continue;
        ids.forEach(id => used.add(id));
        round.push(m); playedSet.add(m);
        const ap = m.teamA.map(p => baseId(p.id));
        const bp = m.teamB.map(p => baseId(p.id));
        if (ap.length === 2) mInc(teamed, ap[0], ap[1]);
        if (bp.length === 2) mInc(teamed, bp[0], bp[1]);
        for (const a of ap) for (const b of bp) mInc(opposed, a, b);
        gcInc(gc, ids);
        played.add(matchFingerprint(m));
      }
    }

    // Pass 2: relax soft cap (but hard cap still enforced by eligible filter above)
    for (const m of eligible) {
      if (playedSet.has(m)) continue;
      const ids = [...m.teamA, ...m.teamB].map(p => p.id);
      if (ids.every(id => !used.has(id))) {
        ids.forEach(id => used.add(id));
        round.push(m); playedSet.add(m);
        const ap = m.teamA.map(p => baseId(p.id));
        const bp = m.teamB.map(p => baseId(p.id));
        if (ap.length === 2) mInc(teamed, ap[0], ap[1]);
        if (bp.length === 2) mInc(teamed, bp[0], bp[1]);
        for (const a of ap) for (const b of bp) mInc(opposed, a, b);
        gcInc(gc, ids);
        played.add(matchFingerprint(m));
      }
    }

    for (let i = remaining.length - 1; i >= 0; i--) {
      if (playedSet.has(remaining[i])) remaining.splice(i, 1);
    }
    if (round.length === 0) break;
    rounds.push(round);
  }
  return rounds;
}

function scheduleRoundRobin(allMatches, targetGames = Infinity) {
  return runSchedule(shuffle([...allMatches]), targetGames,
    (eligible, opposed, teamed, gc) => {
      eligible.sort((x, y) =>
        matchPriority(y, opposed, teamed, gc) - matchPriority(x, opposed, teamed, gc)
      );
    }
  );
}

function scheduleBalanced(allMatches, targetGames = Infinity) {
  return runSchedule([...allMatches], targetGames,
    (eligible, opposed, teamed, gc) => {
      eligible.sort((a, b) => {
        // 3: loadScore first (spread total games)
        const lsDiff = loadScore(a, gc) - loadScore(b, gc);
        if (lsDiff !== 0) return lsDiff;
        // 4: novelty
        const novDiff = novelty(b, opposed, teamed) - novelty(a, opposed, teamed);
        if (novDiff !== 0) return novDiff;
        // 2: maxLoad last soft criterion
        const mlDiff = maxLoad(a, gc) - maxLoad(b, gc);
        if (mlDiff !== 0) return mlDiff;
        // skill gap tiebreaker (balanced mode only)
        return Math.abs(teamSkill(a.teamA) - teamSkill(a.teamB)) -
               Math.abs(teamSkill(b.teamA) - teamSkill(b.teamB));
      });
    }
  );
}

function computeStats(rounds, players, mode) {
  const isSingles = mode && mode.includes("singles");
  const opposed = {}, teamed = {}, gc = makeGameCount();
  for (const round of rounds) for (const m of round) {
    const ap = m.teamA.map(p => baseId(p.id));
    const bp = m.teamB.map(p => baseId(p.id));
    if (ap.length === 2) mInc(teamed, ap[0], ap[1]);
    if (bp.length === 2) mInc(teamed, bp[0], bp[1]);
    for (const a of ap) for (const b of bp) mInc(opposed, a, b);
    gcInc(gc, [...m.teamA, ...m.teamB].map(p => p.id));
  }
  const ids = players.map(p => p.id);
  let totO = 0, covO = 0, totT = 0, covT = 0;
  for (let i = 0; i < ids.length; i++) for (let j = i + 1; j < ids.length; j++) {
    totO++; if (mGet(opposed, ids[i], ids[j]) > 0) covO++;
    if (!isSingles) { totT++; if (mGet(teamed, ids[i], ids[j]) > 0) covT++; }
  }
  const gameCounts = ids.map(id => gc[id] || 0);
  const minG = gameCounts.length ? Math.min(...gameCounts) : 0;
  const maxG = gameCounts.length ? Math.max(...gameCounts) : 0;
  const avgG = gameCounts.length ? (gameCounts.reduce((s,v)=>s+v,0)/gameCounts.length) : 0;
  const perPlayer = players.map(p => ({ id: p.id, name: p.name, games: gc[p.id] || 0 }));
  return {
    rounds: rounds.length,
    totalMatches: rounds.reduce((s, r) => s + r.length, 0),
    opponentCoverage: totO > 0 ? Math.round(covO / totO * 100) : 100,
    teammateCoverage: isSingles ? null : (totT > 0 ? Math.round(covT / totT * 100) : 100),
    minGames: minG,
    maxGames: maxG,
    avgGames: Math.round(avgG * 10) / 10,
    perPlayer,
  };
}

// Adaptive engine
// currentLevel: estimated level (1-6)
// Returns next question id, or null if done
function nextQuestion(history, currentLevel) {
  const asked = new Set(history.map(h => h.id));
  const lvl = Math.round(currentLevel); // levels are integers 1-6
  // Pick a question at current rounded level not yet asked
  const candidates = QBANK.filter(q => q.level === lvl && !asked.has(q.id));
  if (candidates.length > 0) return candidates[0];
  // If exhausted at this level, pick adjacent
  for (let delta = 1; delta <= 5; delta++) {
    for (const adj of [lvl - delta, lvl + delta]) {
      if (adj < 1 || adj > 6) continue;
      const c = QBANK.filter(q => q.level === adj && !asked.has(q.id));
      if (c.length > 0) return c[0];
    }
  }
  return null; // all questions exhausted
}

// Score 0-3 → level adjustment
function adjustLevel(score, currentLevel) {
  if (score === 3) return Math.min(6, currentLevel + 1);   // 会 → go harder
  if (score === 2) return currentLevel;                     // 有时会 → stay
  if (score === 1) return Math.max(1, currentLevel - 0.5); // 偶尔 → nudge down
  return Math.max(1, currentLevel - 1);                    // 不会 → go easier
}

// After N questions, derive final level from history
function deriveLevel(history) {
  if (history.length === 0) return 2;
  let weightedSum = 0, weightTotal = 0;
  history.forEach((h, i) => {
    const w = i + 1;
    const contribution = h.level + (h.score / 3 - 0.5) * 0.8;
    weightedSum += contribution * w;
    weightTotal += w;
  });
  const avg = weightedSum / weightTotal;
  const clamped = Math.min(6, Math.max(1, avg));
  // Round to nearest 0.5
  return Math.round(clamped * 2) / 2;
}

const MAX_QUESTIONS = 8;
const MIN_QUESTIONS = 5;

function SkillQuiz({ onDone, onClose }) {
  const lang = useLang();
  const [history, setHistory] = useState([]); // [{id, level, score}]
  const [currentLevel, setCurrentLevel] = useState(3); // start at mid
  const [currentQ, setCurrentQ] = useState(() => nextQuestion([], 3));
  const [result, setResult] = useState(null);
  const [answered, setAnswered] = useState(null); // show flash before advancing

  function handleAnswer(score) {
    if (answered !== null) return;
    setAnswered(score);
    const newHistory = [...history, { id: currentQ.id, level: currentQ.level, score }];
    const newLevel = adjustLevel(score, currentLevel);

    setTimeout(() => {
      setAnswered(null);
      const done = newHistory.length >= MAX_QUESTIONS;
      const nextQ = done ? null : nextQuestion(newHistory, newLevel);
      // Only show result if we've hit max OR no more questions AND met minimum
      if (done || (!nextQ && newHistory.length >= MIN_QUESTIONS)) {
        setHistory(newHistory);
        const finalLevel = deriveLevel(newHistory);
        setResult(LEVEL_RESULTS[finalLevel] || LEVEL_RESULTS[Math.round(finalLevel)]);
      } else {
        // Not enough questions yet — find any remaining question
        const fallbackQ = nextQ || nextQuestion(newHistory, newLevel < 3 ? newLevel + 1 : newLevel - 1);
        if (fallbackQ) {
          setHistory(newHistory);
          setCurrentLevel(newLevel);
          setCurrentQ(fallbackQ);
        } else {
          // Truly exhausted all questions
          setHistory(newHistory);
          const finalLevel = deriveLevel(newHistory);
          setResult(LEVEL_RESULTS[finalLevel] || LEVEL_RESULTS[Math.round(finalLevel)]);
        }
      }
    }, 350);
  }

  function restart() {
    setHistory([]); setCurrentLevel(3); setResult(null); setAnswered(null);
    setCurrentQ(nextQuestion([], 3));
  }

  const progress = Math.min(history.length / MAX_QUESTIONS * 100, 100);
  const res = result ? LEVEL_RESULTS[result.level] : null;

  return (
    <div style={{ position:"fixed", inset:0, zIndex:60, display:"flex", alignItems:"flex-end",
      justifyContent:"center", padding:16, background:"rgba(0,0,0,0.75)" }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ width:"100%", maxWidth:400, background:BG2, borderRadius:24, padding:24,
        display:"flex", flexDirection:"column", gap:18, boxShadow:"0 24px 60px rgba(0,0,0,0.5)" }}>

        {!result ? (<>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontWeight:900, fontSize:17 }}>{lang==="en"?"🏸 Skill Assessment":lang==="zh"?"🏸 等级评估":"🏸 等级评估 Skill Assessment"}</div>
              <div style={{ fontSize:11, opacity:0.5 }}>Adaptive Skill Assessment · 中羽标准</div>
            </div>
            <button onClick={onClose} style={{ width:30, height:30, borderRadius:"50%",
              background:"rgba(0,0,0,0.07)", border:"none", cursor:"pointer" }}>✕</button>
          </div>

          {/* Progress */}
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:6, opacity:0.5 }}>
              <span>第 {history.length + 1} 题 / 最多 {MAX_QUESTIONS} 题</span>
              <span>难度 Lv{Number.isInteger(currentLevel) ? currentLevel : currentLevel.toFixed(1)}</span>
            </div>
            <div style={{ height:6, background:"rgba(0,0,0,0.07)", borderRadius:999, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${progress}%`, background:EMERALD,
                borderRadius:999, transition:"width 0.4s" }} />
            </div>
          </div>

          {/* Question card */}
          {currentQ && (
            <div style={{ ...S.card2, padding:20, display:"flex", flexDirection:"column", gap:10,
              transition:"opacity 0.2s", opacity: answered !== null ? 0.4 : 1 }}>
              <div style={{ fontSize:15, fontWeight:700, lineHeight:1.6 }}>{currentQ.q}</div>
              <div style={{ fontSize:11, opacity:0.45, lineHeight:1.5 }}>{currentQ.en}</div>
            </div>
          )}

          {/* 4 choices */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {CHOICES.map(c => (
              <button key={c.score} onClick={() => handleAnswer(c.score)}
                style={{ padding:"13px 8px", borderRadius:14, fontWeight:900, fontSize:14,
                  border: answered === c.score ? "2px solid currentColor" : "2px solid transparent",
                  background: c.bg, cursor:"pointer", transition:"all 0.15s",
                  opacity: answered !== null && answered !== c.score ? 0.4 : 1 }}
                className={c.cls}>
                <div>{c.label}</div>
                <div style={{ fontSize:10, fontWeight:400, opacity:0.7, marginTop:2 }}>{c.en}</div>
              </button>
            ))}
          </div>
        </>) : (<>
          {/* Result */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontWeight:900, fontSize:17 }}>{lang==="en"?"🎯 Assessment Result":lang==="zh"?"🎯 评估结果":"🎯 评估结果 Result"}</div>
            <button onClick={onClose} style={{ width:30, height:30, borderRadius:"50%",
              background:"rgba(0,0,0,0.07)", border:"none", cursor:"pointer" }}>✕</button>
          </div>

          <div style={{ ...S.card2, padding:22, textAlign:"center", display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ fontSize:52, fontWeight:900, color: result.color }}>Lv{result.level}</div>
            <div style={{ fontSize:19, fontWeight:900 }}>{result.label}</div>
            <div style={{ fontSize:13, lineHeight:1.75, opacity:0.7 }}>{result.desc}</div>
            <div style={{ fontSize:10, opacity:0.35, marginTop:4 }}>
              回答了 {history.length} 题
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <button onClick={restart}
              style={{ padding:"12px 0", borderRadius:12, fontWeight:700, fontSize:14,
                border:"none", cursor:"pointer", background:"rgba(0,0,0,0.06)" }} className="c-muted">
              {lang==="en"?"↺ Retry":lang==="zh"?"↺ 重测":"↺ 重测 Retry"}
            </button>
            <button onClick={() => onDone(parseFloat(result.level))}
              style={{ padding:"12px 0", borderRadius:12, fontWeight:700, fontSize:14,
                border:"none", cursor:"pointer", background:EMERALD }} className="c-white">
              {lang==="en"?`Use Lv${result.level}`:lang==="zh"?`用 Lv${result.level}`:`用 Lv${result.level} Use`}
            </button>
          </div>
        </>)}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   HISTORY-AWARE SCHEDULER
═══════════════════════════════════════════════════════════ */
function buildGcFromRounds(rds) {
  const gc = {};
  (rds||[]).forEach(r => r.forEach(m => [...m.teamA,...m.teamB].forEach(p => {
    const b = baseId(p.id); gc[b] = (gc[b]||0) + 1;
  })));
  return gc;
}

function buildOpposedFromRounds(rds) {
  const opposed = {}, teamed = {};
  (rds||[]).forEach(r => r.forEach(m => {
    const ap = m.teamA.map(p => baseId(p.id));
    const bp = m.teamB.map(p => baseId(p.id));
    if (ap.length===2) mInc(teamed, ap[0], ap[1]);
    if (bp.length===2) mInc(teamed, bp[0], bp[1]);
    for (const a of ap) for (const b of bp) mInc(opposed, a, b);
  }));
  return { opposed, teamed };
}

function schedWithHistory(players, mode, targetGames, opposedIn={}, teamedIn={}, gcIn={}) {
  const ms = players.filter(p => p.gender==="M");
  const fs = players.filter(p => p.gender==="F");
  const allMatches = getAllMatches(mode, ms, fs);
  if (!allMatches.length) return [];
  // Clone history state so we don't mutate caller's objects
  const opposed = {...opposedIn}, teamed = {...teamedIn}, gc = {...gcIn};
  return runScheduleWithState(shuffle([...allMatches]), targetGames, opposed, teamed, gc);
}

function runScheduleWithState(allMatches, targetGames, opposed, teamed, gc) {
  const remaining = [...allMatches];
  const rounds = [];
  const played = new Set();
  while (remaining.length > 0) {
    const eligible = remaining.filter(m =>
      !played.has(matchFingerprint(m)) && !exceedsHardCap(m, gc, targetGames)
    );
    if (eligible.length === 0) break;
    eligible.sort((x, y) => matchPriority(y, opposed, teamed, gc) - matchPriority(x, opposed, teamed, gc));
    const used = new Set(), round = [], playedSet = new Set();
    for (const pass of [0, 1]) {
      for (const m of eligible) {
        if (playedSet.has(m)) continue;
        const ids = [...m.teamA, ...m.teamB].map(p => p.id);
        if (ids.some(id => used.has(id))) continue;
        if (pass === 0 && ids.some(id => gcGet(gc, id) >= targetGames + 1)) continue;
        ids.forEach(id => used.add(id));
        round.push(m); playedSet.add(m);
        const ap = m.teamA.map(p => baseId(p.id)), bp = m.teamB.map(p => baseId(p.id));
        if (ap.length===2) mInc(teamed, ap[0], ap[1]);
        if (bp.length===2) mInc(teamed, bp[0], bp[1]);
        for (const a of ap) for (const b of bp) mInc(opposed, a, b);
        gcInc(gc, ids);
        played.add(matchFingerprint(m));
      }
    }
    for (let i = remaining.length-1; i >= 0; i--) {
      if (playedSet.has(remaining[i])) remaining.splice(i, 1);
    }
    if (round.length === 0) break;
    rounds.push(round);
    if (rounds.length >= targetGames * 3) break;
  }
  return rounds;
}

function ShareModal({ result, matchMode, onClose }) {
  const lang = useLang();
  const [shareTab, setShareTab] = useState("text");
  const [copied, setCopied] = useState(false);
  const [pdfStatus, setPdfStatus] = useState("idle");

  const { rounds, stats } = result;

  function buildText() {
    const lines = [];
    lines.push("🏸 羽毛球赛程安排");
    lines.push(`${new Date().toLocaleDateString("zh-CN")} · ${stats.rounds}轮 · ${stats.totalMatches}场`);
    lines.push("");
    rounds.forEach((round, ri) => {
      lines.push(`【第${ri+1}轮】`);
      round.forEach((m, mi) => {
        const ta = m.teamA.map(p => p.name + (p.borrowed ? "★" : "")).join("/");
        const tb = m.teamB.map(p => p.name + (p.borrowed ? "★" : "")).join("/");
        lines.push(`  ${mi+1}. ${ta} vs ${tb}`);
      });
      lines.push("");
    });
    lines.push(`对手覆盖率 ${stats.opponentCoverage}%${stats.teammateCoverage !== null ? " · 队友覆盖率 " + stats.teammateCoverage + "%" : ""}`);
    return lines.join("\n");
  }

  function copyText() {
    const text = buildText();
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 2500);
    });
  }

  function openPDF() {
    setPdfStatus("loading");
    const { rounds, stats } = result;
    const hasBorrow = rounds.some(r => r.some(m => [...m.teamA, ...m.teamB].some(p => p.borrowed)));

    function playerLabel(p) {
      return `${p.name}${p.borrowed ? "★" : ""}${p.skill !== undefined ? ` (L${p.skill})` : ""}`;
    }
    function teamLabel(team) { return team.map(playerLabel).join(" / "); }

    const roundRows = rounds.map((round, ri) => {
      const matchRows = round.map((m, mi) => {
        const diff = Math.abs((m.teamA.reduce((s,p)=>s+(p.skill??5),0)/m.teamA.length) -
                              (m.teamB.reduce((s,p)=>s+(p.skill??5),0)/m.teamB.length)).toFixed(1);
        return `<tr class="match-row">
          <td class="match-num">${mi + 1}</td>
          <td class="team-a">${teamLabel(m.teamA)}</td>
          <td class="vs">VS</td>
          <td class="team-b">${teamLabel(m.teamB)}</td>
          ${matchMode === "balanced" ? `<td class="diff">Δ${diff}</td>` : "<td></td>"}
        </tr>`;
      }).join("");
      return `<tbody>
        <tr class="round-header">
          <td colspan="5">第 ${ri+1} 轮 Round ${ri+1} · ${round.length} 场 matches</td>
        </tr>
        ${matchRows}
      </tbody>`;
    }).join("");

    const perPlayerRows = (stats.perPlayer || [])
      .sort((a,b) => b.games - a.games)
      .map(p => `<tr><td>${p.name}</td><td class="games-val">${p.games}</td></tr>`)
      .join("");

    const html = `<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>羽毛球赛程 Badminton Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
         background: #fff; color: #1a1a1a; padding: 24px; font-size: 13px; }
  h1 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { border: 1px solid #e5e5e5; border-radius: 10px; padding: 10px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 900; color: #16a34a; }
  .stat-label { font-size: 10px; color: #888; margin-top: 2px; }
  h2 { font-size: 14px; font-weight: 700; margin: 16px 0 8px; border-bottom: 2px solid #16a34a; padding-bottom: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .round-header td { background: #f0fdf4; font-weight: 700; color: #15803d;
                     padding: 7px 10px; border-top: 1px solid #bbf7d0; border-bottom: 1px solid #bbf7d0; font-size: 11px; }
  .match-row td { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
  .match-row:hover td { background: #fafafa; }
  .match-num { color: #aaa; width: 24px; }
  .team-a, .team-b { font-weight: 600; }
  .team-b { text-align: right; }
  .vs { text-align: center; font-weight: 900; color: #16a34a; font-size: 11px; width: 28px; }
  .diff { text-align: right; color: #999; font-size: 10px; width: 32px; }
  .dist-table { width: auto; max-width: 320px; }
  .dist-table td { padding: 4px 10px; border-bottom: 1px solid #f3f4f6; }
  .games-val { font-weight: 700; color: #16a34a; text-align: right; }
  .note { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
           padding: 8px 12px; font-size: 11px; color: #92400e; margin-top: 12px; }
  .footer { margin-top: 24px; text-align: center; font-size: 10px; color: #ccc; }
  @media print { body { padding: 16px; } }
</style>
</head>
<body>
<div style="text-align:center;margin-bottom:24px;">
  <div style="font-size:36px;margin-bottom:6px;">🏸</div>
  <h1>羽毛球赛程安排</h1>
  <p class="subtitle">Badminton Match Schedule · ${new Date().toLocaleDateString("zh-CN")}</p>
</div>
<div class="stats-grid">
  <div class="stat-card"><div class="stat-val">${stats.rounds}</div><div class="stat-label">轮次 Rounds</div></div>
  <div class="stat-card"><div class="stat-val">${stats.totalMatches}</div><div class="stat-label">总场次 Matches</div></div>
  <div class="stat-card"><div class="stat-val">${stats.opponentCoverage}%</div><div class="stat-label">对手覆盖 Opp.</div></div>
  ${stats.teammateCoverage !== null ? `<div class="stat-card"><div class="stat-val">${stats.teammateCoverage}%</div><div class="stat-label">队友覆盖 Partner</div></div>` : ""}
</div>
${hasBorrow ? `<div class="note">★ 性别人数不均，已借调球员参与混双 · Uneven gender count — players subbed in (★)</div>` : ""}
<h2>完整赛程 Full Schedule</h2>
<table>${roundRows}</table>
${perPlayerRows ? `<h2>场次分布 Games Distribution · avg ${stats.avgGames} · min ${stats.minGames} / max ${stats.maxGames}</h2>
<table class="dist-table"><tbody>${perPlayerRows}</tbody></table>` : ""}
<div class="footer">Generated by 羽毛球赛程安排 Badminton Match Scheduler</div>
</body>
</html>`;

    const win = window.open("", "_blank", "width=800,height=900");
    if (!win) { setPdfStatus("idle"); return; }
    win.document.write(html);
    win.document.close();
    win.onload = () => {
      setTimeout(() => {
        win.focus();
        win.print();
        setPdfStatus("done");
        setTimeout(() => setPdfStatus("idle"), 2000);
      }, 300);
    };
  }

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: 16, background: "rgba(0,0,0,0.80)" }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ width: "100%", maxWidth: 400, background: BG2, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 24, padding: 20, display: "flex", flexDirection: "column", gap: 16, boxShadow: "0 24px 60px rgba(0,0,0,0.8)" }}>
        <style>{`@keyframes slideUp { from { transform:translateY(40px); opacity:0 } to { transform:translateY(0); opacity:1 } }`}</style>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontWeight: 900, fontSize: 18 }}>分享赛程</div>
            <div style={{ fontSize: 11}}>Share Schedule</div>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: "50%", background: "rgba(0,0,0,0.07)", border: "none", cursor: "pointer", fontSize: 14 }}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, background: "rgba(0,0,0,0.04)", padding: 4, borderRadius: 14, border: "1px solid rgba(0,0,0,0.05)" }}>
          {[
            { id: "text", label: lang==="en"?"💬 Copy Text":lang==="zh"?"💬 复制文字":"💬 复制文字 Copy" },
            { id: "pdf",  label: lang==="en"?"📄 Print/PDF":lang==="zh"?"📄 打印/PDF":"📄 打印 Print/PDF" },
          ].map(t => (
            <button key={t.id} onClick={() => setShareTab(t.id)} style={{
              flex: 1, padding: "8px 0", borderRadius: 10, fontSize: 13, fontWeight: 700, border: "none", cursor: "pointer",
              background: shareTab === t.id ? EMERALD : "transparent",
            }} className={shareTab === t.id ? "c-white" : "c-muted"}>{t.label}</button>
          ))}
        </div>

        {shareTab === "text" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 11, lineHeight: 1.7, opacity: 0.7 }}>
              复制后可直接粘贴到微信/钉钉群发给队友
            </div>
            <pre style={{
              background: "rgba(0,0,0,0.04)", border: "1px solid rgba(0,0,0,0.07)",
              borderRadius: 12, padding: "12px 14px", fontSize: 12, lineHeight: 1.8,
              whiteSpace: "pre-wrap", wordBreak: "break-word", maxHeight: 280, overflowY: "auto",
              fontFamily: "'PingFang SC','Microsoft YaHei',sans-serif", userSelect: "all",
            }}>{buildText()}</pre>
            <button onClick={copyText} style={{
              width: "100%", padding: "13px 0", borderRadius: 12, fontWeight: 900, fontSize: 15, border: "none", cursor: "pointer",
              background: copied ? "#14532d" : EMERALD,
            }} className="c-white">{copied ? (lang==="en"?"✓ Copied! Paste to share":"✓ 已复制！直接粘贴发给队友") : (lang==="en"?"📋 Copy Schedule":"📋 一键复制赛程")}</button>
          </div>
        )}

        {shareTab === "pdf" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 11, lineHeight: 1.7 }}>
              生成完整赛程的打印页面，可直接打印或保存为 PDF。<br/>
              <span style={{ opacity: 0.7 }}>Opens a print-ready page — print directly or save as PDF.</span>
            </div>
            <div style={{ background: "rgba(0,0,0,0.04)", border: "1px solid rgba(0,0,0,0.07)", borderRadius: 12, padding: 12, display: "flex", flexDirection: "column", gap: 6 }}>
              {[
                `${result.stats.rounds} 轮 · ${result.stats.totalMatches} 场`,
                `对手覆盖 ${result.stats.opponentCoverage}%${result.stats.teammateCoverage !== null ? " · 队友覆盖 " + result.stats.teammateCoverage + "%" : ""}`,
                result.stats.perPlayer?.length ? `${result.stats.perPlayer.length} 名球员场次分布` : null,
              ].filter(Boolean).map((line, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11}}>
                  <span className="c-green">→</span><span>{line}</span>
                </div>
              ))}
            </div>
            <button onClick={openPDF} disabled={pdfStatus === "loading"} style={{
              width: "100%", padding: "12px 0", borderRadius: 12, fontWeight: 900, fontSize: 14, border: "none", cursor: pdfStatus === "loading" ? "not-allowed" : "pointer",
              background: pdfStatus === "done" ? "#14532d" : pdfStatus === "loading" ? "rgba(0,0,0,0.07)" : "#0ea5e9",
              
            }}>
              {pdfStatus === "done" ? "✓ 已打开 Opened!" : pdfStatus === "loading" ? "⏳ 生成中…" : "📄 打开打印页面 Open Print Page"}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {[{l:lang==="en"?"Rounds":lang==="zh"?"总轮次":"总轮次 Rounds",v:rounds.length,c:SKY},{l:lang==="en"?"Matches":lang==="zh"?"总场次":"总场次 Matches",v:total,c:VIOLET},{l:lang==="en"?"Done":lang==="zh"?"已完成":"已完成 Done",v:`${done}/${total}`,c:EMERALD}]}.map(s=>(

function BasicPanel(){
  const lang = useLang();
  const MODES=[{id:"mixed",label:"混合双打",en:"Mixed Doubles",icon:"⚡"},{id:"mens_doubles",label:"男子双打",en:"Men's Doubles",icon:"💪"},{id:"womens_doubles",label:"女子双打",en:"Women's Doubles",icon:"🌸"},{id:"mens_singles",label:"男子单打",en:"Men's Singles",icon:"🔥"},{id:"womens_singles",label:"女子单打",en:"Women's Singles",icon:"✨"}];
  const [numM,setM]=useState(4),[numF,setF]=useState(4),[mode,setMode]=useState("mixed"),[tgt,setTgt]=useState(5);
  const [rounds,setRounds]=useState(null),[checked,setChecked]=useState({}),[pool,setPool]=useState([]);
  const mi=MODES.find(m=>m.id===mode);
  const needM=mi?.id==="mixed"||mi?.id?.includes("mens");
  const needF=mi?.id==="mixed"||mi?.id?.includes("womens");
  function mkPlayers(nM,nF){return [...Array.from({length:nM},(_,i)=>({id:`M${i}`,name:`男${i+1}`,gender:"M"})),...Array.from({length:nF},(_,i)=>({id:`F${i}`,name:`女${i+1}`,gender:"F"}))]; }
  function gen(){const p=mkPlayers(needM?numM:0,needF?numF:0);setPool(p);setRounds(schedWithHistory(p,mode,tgt));setChecked({});}
  function addPlayers(ri,nM,nF){
    const kept=(rounds||[]).slice(0,ri+1);
    // Build gc from kept rounds
    const gc=buildGcFromRounds(kept);
    const pm=pool.filter(p=>p.gender==="M").length,pf=pool.filter(p=>p.gender==="F").length;
    const np=mkPlayers(pm+nM,pf+nF);setPool(np);
    setRounds([...kept,...schedWithHistory(np,mode,tgt,{},{},gc)]);
  }
  function removePlayer(ri,ids){
    const kept=(rounds||[]).slice(0,ri+1);
    const gc=buildGcFromRounds(kept);
    const np=pool.filter(p=>!ids.includes(p.id));setPool(np);
    setRounds([...kept,...schedWithHistory(np,mode,tgt,{},{},gc)]);
  }
  function moreRounds(ri,n){
    const kept=(rounds||[]).slice(0,ri+1);
    const gc=buildGcFromRounds(kept);
    setRounds([...kept,...schedWithHistory(pool,mode,n,{},{},gc)]);
  }
  const ok=mode==="mixed"?(numM>=1&&numF>=1):(needM?numM>=2:true)&&(needF?numF>=2:true);
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"grid",gridTemplateColumns:needM&&needF?"1fr 1fr":"1fr",gap:12}}>
      {needM&&<div style={{background:SKY_L,border:"1px solid rgba(2,132,199,.25)",borderRadius:16,padding:14}}>
        <div style={{fontSize:11,marginBottom:10,opacity:.7,whiteSpace:"pre-line",lineHeight:1.4}}>{lang==="en"?"Male Players":lang==="zh"?"男生人数":"男生人数\nMale Players"}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>setM(Math.max(0,numM-1))} style={{width:32,height:32,borderRadius:8,background:"rgba(0,0,0,.07)",border:"none",fontSize:18,cursor:"pointer"}}>−</button>
          <span style={{fontSize:36,fontWeight:900,color:SKY}}>{numM}</span>
          <button onClick={()=>setM(Math.min(20,numM+1))} style={{width:32,height:32,borderRadius:8,background:"rgba(0,0,0,.07)",border:"none",fontSize:18,cursor:"pointer"}}>+</button>
        </div>
      </div>}
      {needF&&<div style={{background:ROSE_L,border:"1px solid rgba(225,29,72,.25)",borderRadius:16,padding:14}}>
        <div style={{fontSize:11,marginBottom:10,opacity:.7,whiteSpace:"pre-line",lineHeight:1.4}}>{lang==="en"?"Female Players":lang==="zh"?"女生人数":"女生人数\nFemale Players"}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>setF(Math.max(0,numF-1))} style={{width:32,height:32,borderRadius:8,background:"rgba(0,0,0,.07)",border:"none",fontSize:18,cursor:"pointer"}}>−</button>
          <span style={{fontSize:36,fontWeight:900,color:ROSE}}>{numF}</span>
          <button onClick={()=>setF(Math.min(20,numF+1))} style={{width:32,height:32,borderRadius:8,background:"rgba(0,0,0,.07)",border:"none",fontSize:18,cursor:"pointer"}}>+</button>
        </div>
      </div>}
    </div>
    <div style={{...S.card,padding:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div><div style={{fontSize:14,fontWeight:700}}>{lang==="en"?"Target Games/Person":lang==="zh"?"人均场次目标":"人均场次目标"}</div><div style={{fontSize:10,opacity:.5}}>{lang==="zh"?"":lang==="en"?"Target games per person":"Target games per person"}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>setTgt(Math.max(1,tgt-1))} style={{width:30,height:30,borderRadius:8,background:"rgba(0,0,0,.07)",border:"none",fontSize:16,cursor:"pointer"}}>−</button>
        <span style={{fontSize:24,fontWeight:900,color:AMBER,width:32,textAlign:"center"}}>{tgt}</span>
        <button onClick={()=>setTgt(Math.min(20,tgt+1))} style={{width:30,height:30,borderRadius:8,background:"rgba(0,0,0,.07)",border:"none",fontSize:16,cursor:"pointer"}}>+</button>
      </div>
    </div>
    <div style={{...S.card,padding:14,display:"flex",flexDirection:"column",gap:8}}>
      <div style={S.lbl}>{lang==="en"?"Game Mode":lang==="zh"?"比赛模式":"比赛模式 Game Mode"}</div>
      {MODES.map(m=>{const active=mode===m.id;return <button key={m.id} onClick={()=>{setMode(m.id);setRounds(null);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,border:`1px solid ${active?"rgba(22,163,74,.45)":"rgba(0,0,0,.07)"}`,background:active?EMERALD_L:"rgba(0,0,0,.03)",width:"100%",textAlign:"left",cursor:"pointer",color:active?"#14532d":"rgba(17,26,17,.6)"}}>
        <span style={{fontSize:16}}>{m.icon}</span>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{m.label}</div><div style={{fontSize:10,opacity:.5}}>{m.en}</div></div>
        {active&&<span style={{color:EMERALD}}>✓</span>}
      </button>;})}
    </div>
    <button onClick={gen} disabled={!ok} style={{width:"100%",padding:"14px 0",borderRadius:16,fontWeight:900,fontSize:14,background:ok?EMERALD:"rgba(0,0,0,.05)",border:"none",cursor:ok?"pointer":"not-allowed",color:ok?"#fff":"rgba(0,0,0,.25)"}}>{lang==="en"?"🏸 Generate Schedule":lang==="zh"?"🏸 生成赛程":"🏸 生成赛程 Generate Schedule"}</button>
    {rounds&&<ResultView rounds={rounds} mode={mode} checked={checked} setChecked={setChecked} onRegen={gen} onAddPlayers={addPlayers} onRemovePlayers={removePlayer} onMoreRounds={moreRounds} isOwner={true}/>}
  </div>;
}

/* ── AdvancedPanel ── */
function AdvancedPanel(){
  const lang = useLang();
  const [screen,setScreen]=useState("join"),[input,setInput]=useState(""),[code,setCode]=useState("");
  const [isOwner,setIsOwner]=useState(false);
  const [players,setPlayers]=useState([]),[tab,setTab]=useState("roster");
  const [form,setForm]=useState({name:"",gender:"M",skill:3});
  const [rounds,setRounds]=useState(null),[checked,setChecked]=useState({});
  const [sync,setSync]=useState("");
  const [targetGames,setTargetGames]=useState(5);
  const [matchMode,setMatchMode]=useState("random");
  const [gameMode,setGameMode]=useState("mixed");
  const [myId]=useState(()=>{
    try { let id=localStorage.getItem("bmt_uid"); if(!id){id=uid();localStorage.setItem("bmt_uid",id);} return id; } catch { return uid(); }
  });
  // ownerIdRef holds the room's owner_id — NEVER changes except on explicit transfer
  const ownerIdRef = useRef(null);

  // Restore room on mount
  useEffect(()=>{
    try {
      const saved=localStorage.getItem("bmt_room_code");
      if(saved){ setInput(saved); joinRoom(saved, localStorage.getItem("bmt_room_owner")==="1"); }
    } catch {}
  }, []);
  const ms=players.filter(p=>p.gender==="M"),fs=players.filter(p=>p.gender==="F");

  async function saveRoomState(newPlayers, newRounds, explicitNewOwner, roomCodeOverride) {
    const activeCode = roomCodeOverride || code;
    if(!activeCode) return;
    setSync("同步中…");
    const ownerToSave = explicitNewOwner || ownerIdRef.current || myId;
    try {
      await sbFetch(`/rest/v1/bmt_rooms`, {
        method:"POST",
        headers:{"Prefer":"resolution=merge-duplicates,return=representation"},
        body:JSON.stringify({
          code: activeCode,
          players: newPlayers,
          schedule: newRounds ? {rounds:newRounds, ts:Date.now()} : null,
          owner_id: ownerToSave,
          updated_at: new Date().toISOString(),
        }),
      });
      setSync("✓ 已同步");
    } catch { setSync("⚠ 同步失败"); }
    setTimeout(()=>setSync(""),2500);
  }

  // Poll every 4 seconds for updates
  useEffect(()=>{
    if(!code) return;
    const poll = async () => {
      try {
        const data = await sbFetch(`/rest/v1/bmt_rooms?code=eq.${encodeURIComponent(code)}&select=players,schedule,owner_id`);
        if(!data||!data[0]) return;
        const row = data[0];
        if(row.players) setPlayers(row.players);
        if(row.schedule?.rounds) setRounds(row.schedule.rounds);
        if(row.owner_id) {
          ownerIdRef.current = row.owner_id;
          setIsOwner(row.owner_id === myId);
        }
      } catch {}
    };
    poll();
    const iv = setInterval(poll, 4000);
    return ()=>clearInterval(iv);
  }, [code]);

  function addP(){
    if(!form.name.trim())return;
    const newP={id:uid(),name:form.name.trim(),gender:form.gender,skill:form.skill,addedBy:myId};
    const np=[...players,newP];
    setPlayers(np);
    setForm(f=>({...f,name:"",skill:3}));
    saveRoomState(np, rounds);
  }
  function delP(id){
    const np=players.filter(x=>x.id!==id);
    setPlayers(np);
    saveRoomState(np, rounds);
  }

  // buildGcFromRounds is defined globally above

  function gen(){
    if(!isOwner)return;
    const allM = getAllMatches(gameMode, ms, fs);
    if(!allM.length) return;
    const newRounds = matchMode==="balanced"
      ? scheduleBalanced(allM, targetGames)
      : scheduleRoundRobin(allM, targetGames);
    setRounds(newRounds);setChecked({});setTab("schedule");
    saveRoomState(players, newRounds);
  }
  function addPlayers(ri,nM,nF){
    if(!isOwner)return;
    const kept=(rounds||[]).slice(0,ri+1);
    const gc=buildGcFromRounds(kept);
    const {opposed,teamed}=buildOpposedFromRounds(kept);
    const nm=[...ms,...Array.from({length:nM},(_,i)=>({id:uid(),name:`新男${i+1}`,gender:"M",skill:3,addedBy:myId}))];
    const nf=[...fs,...Array.from({length:nF},(_,i)=>({id:uid(),name:`新女${i+1}`,gender:"F",skill:3,addedBy:myId}))];
    const np=[...nm,...nf]; setPlayers(np);
    const newRounds=[...kept,...schedWithHistory(np,gameMode,targetGames,opposed,teamed,gc)];
    setRounds(newRounds);
    saveRoomState(np, newRounds);
  }
  function removePlayer(ri,ids){
    if(!isOwner)return;
    const kept=(rounds||[]).slice(0,ri+1);
    const gc=buildGcFromRounds(kept);
    const {opposed,teamed}=buildOpposedFromRounds(kept);
    const np=players.filter(p=>!ids.includes(p.id)); setPlayers(np);
    const newRounds=[...kept,...schedWithHistory(np,gameMode,targetGames,opposed,teamed,gc)];
    setRounds(newRounds);
    saveRoomState(np, newRounds);
  }
  function moreRounds(ri,n){
    if(!isOwner)return;
    const kept=(rounds||[]).slice(0,ri+1);
    const gc=buildGcFromRounds(kept);
    const {opposed,teamed}=buildOpposedFromRounds(kept);
    const newRounds=[...kept,...schedWithHistory(players,gameMode,n,opposed,teamed,gc)];
    setRounds(newRounds);
    saveRoomState(players, newRounds);
  }
  function transferOwner(newOwnerId){
    ownerIdRef.current = newOwnerId;
    setIsOwner(false);
    saveRoomState(players, rounds, newOwnerId);
  }

  async function joinRoom(c, asOwner){
    const code2=c.trim().toUpperCase();
    if(!code2)return;
    try {
      const data = await sbFetch(`/rest/v1/bmt_rooms?code=eq.${encodeURIComponent(code2)}&select=players,schedule,owner_id`);
      if(data&&data[0]){
        if(data[0].players) setPlayers(data[0].players);
        if(data[0].schedule?.rounds) setRounds(data[0].schedule.rounds);
        const existOwner = data[0].owner_id;
        ownerIdRef.current = existOwner || (asOwner ? myId : null);
        setIsOwner(asOwner || existOwner===myId);
      } else {
        // New room — I am the owner
        ownerIdRef.current = myId;
        // Pass code2 directly since setCode hasn't taken effect yet
        await saveRoomState([], null, myId, code2);
        setIsOwner(true);
      }
    } catch { setIsOwner(asOwner); }
    setCode(code2);
    try { localStorage.setItem("bmt_room_code",code2); localStorage.setItem("bmt_room_owner",asOwner?"1":"0"); } catch {}
    setScreen("room");
  }

  if(screen==="join") return (
    <div style={{...S.card,padding:24,display:"flex",flexDirection:"column",gap:14,textAlign:"center"}}>
      <div style={{fontSize:36}}>🏸</div>
      <div><div style={{fontWeight:900,fontSize:18,marginBottom:4}}>{lang==="en"?"Join or Create a Room":lang==="zh"?"加入或创建房间":"加入或创建房间 Join / Create Room"}</div>
        <div style={{fontSize:12,opacity:.5}}>{lang==="en"?"All room members share roster and schedule in real time":lang==="zh"?"同一房间共享球员名单和赛程，实时同步":"同一房间共享球员名单 Share roster in real time"}</div></div>
      <input value={input} onChange={e=>setInput(e.target.value.toUpperCase())} placeholder="输入房间码 e.g. ABC123"
        style={{background:BG3,border:`1px solid ${BORDER}`,borderRadius:12,padding:"12px 16px",fontSize:18,fontWeight:900,letterSpacing:4,textAlign:"center",outline:"none",width:"100%"}}/>
      <button onClick={()=>joinRoom(input,false)}
        style={{width:"100%",padding:"13px 0",borderRadius:12,fontWeight:900,fontSize:15,background:input.trim()?EMERALD:"rgba(0,0,0,.1)",border:"none",cursor:"pointer",color:input.trim()?"#fff":"rgba(0,0,0,.3)"}}>{lang==="en"?"Join Room":lang==="zh"?"加入房间":"加入房间 Join Room"}</button>
      <button onClick={()=>{const c="BMT-"+Math.random().toString(36).slice(2,6).toUpperCase();joinRoom(c,true);}}
        style={{width:"100%",padding:"13px 0",borderRadius:12,fontWeight:900,fontSize:15,background:"rgba(0,0,0,.06)",border:"none",cursor:"pointer"}}>{lang==="en"?"✨ Create New Room (You are Host)":lang==="zh"?"✨ 创建新房间（你是房主）":"✨ 创建新房间 Create New Room"}</button>
    </div>
  );

  return <div style={{display:"flex",flexDirection:"column",gap:12}}>
    {/* Room banner */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:EMERALD_L,border:"1px solid rgba(22,163,74,.25)",borderRadius:12,padding:"10px 14px"}}>
      <div>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:2,opacity:.6,textTransform:"uppercase"}}>
          {lang==="en"?"ROOM CODE":"房间码"} · {isOwner?"👑 房主 Host":"成员 Member"}
        </div>
        <div style={{fontSize:9,opacity:.4,letterSpacing:1,marginTop:2}}>
          ID: {myId.slice(0,6)} {isOwner?"(房主 Host)":""}
        </div>
        <div style={{fontSize:20,fontWeight:900,letterSpacing:4,color:EMERALD}}>{code}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {sync&&<span style={{fontSize:10,color:EMERALD}}>{sync}</span>}
        <button style={{fontSize:11,fontWeight:700,padding:"5px 8px",borderRadius:8,border:"none",cursor:"pointer",background:"rgba(22,163,74,.15)",color:"#14532d"}}>{lang==="en"?"Copy":lang==="zh"?"复制":"复制 Copy"}</button>
        {isOwner&&<button onClick={()=>{ const id=window.prompt("输入新房主的用户ID（让对方告诉你）:\n新房主ID:"); if(id) transferOwner(id.trim()); }} style={{fontSize:11,padding:"5px 8px",borderRadius:8,border:"none",cursor:"pointer",background:AMBER_L,color:AMBER,fontWeight:700}}>{lang==="en"?"👑 Transfer":lang==="zh"?"👑转让":"👑转让 Transfer"}</button>}
        <button onClick={()=>setScreen("join")} style={{fontSize:11,padding:"5px 8px",borderRadius:8,border:"none",cursor:"pointer",background:"rgba(0,0,0,.06)"}}>{lang==="en"?"Leave":lang==="zh"?"退出":"退出 Leave"}</button>
      </div>
    </div>

    {/* Sub-tabs */}
    <div style={{display:"flex",gap:4,background:"rgba(0,0,0,.04)",padding:4,borderRadius:14,border:`1px solid ${BORDER}`}}>
      {[["roster",lang==="en"?`Roster (${players.length})`:lang==="zh"?`名册 (${players.length})`:`名册 Roster (${players.length})`],["schedule",lang==="en"?`Schedule${rounds?" ✓":""}`:lang==="zh"?"赛程安排":"赛程安排 Schedule"]].map(([id,l])=>(

      <div style={{display:"flex",gap:8}}>
        <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addP()} placeholder={lang==="en"?"Player name":lang==="zh"?"球员名字":"球员名字 Player name"}
          style={{flex:1,background:BG3,border:`1px solid ${BORDER}`,borderRadius:12,padding:"10px 12px",fontSize:14,outline:"none"}}/>
        <div style={{display:"flex",borderRadius:12,overflow:"hidden",border:`1px solid ${BORDER}`}}>
          {["M","F"].map(g=><button key={g} onClick={()=>setForm(f=>({...f,gender:g}))} style={{padding:"8px 12px",fontSize:13,fontWeight:700,border:"none",cursor:"pointer",background:form.gender===g?(g==="M"?"#0ea5e9":"#f43f5e"):"rgba(0,0,0,.04)",color:form.gender===g?"#fff":"rgba(17,26,17,.5)"}}>{g==="M"?(lang==="en"?"M":lang==="zh"?"男":"男 M"):(lang==="en"?"F":lang==="zh"?"女":"女 F")}</button>)}
        </div>
      </div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}><span style={{opacity:.5}}>{lang==="en"?"Skill Level":lang==="zh"?"技术水平":"技术水平 Skill"}</span><span style={{fontWeight:700}}>Lv{form.skill}</span></div>
        <input type="range" min={2} max={12} step={1} value={form.skill*2} onChange={e=>setForm(f=>({...f,skill:+e.target.value/2}))} style={{width:"100%",accentColor:EMERALD}}/>
        <button style={{width:"100%",marginTop:6,padding:"8px 0",borderRadius:12,fontWeight:700,fontSize:12,border:`1px dashed ${VIOLET}`,cursor:"pointer",background:VIOLET_L,color:VIOLET}}>{lang==="en"?"🎯 Assess My Level":lang==="zh"?"🎯 帮我评估等级":"🎯 不确定？评估等级 Assess Level"}</button>
      </div>
      <button onClick={addP} disabled={!form.name.trim()} style={{width:"100%",padding:"10px 0",borderRadius:12,fontWeight:700,fontSize:14,border:"none",background:form.name.trim()?EMERALD:"rgba(0,0,0,.05)",cursor:form.name.trim()?"pointer":"not-allowed",color:form.name.trim()?"#fff":"rgba(0,0,0,.25)"}}>+ 添加球员 Add Player</button>

      {players.length===0?<div style={{textAlign:"center",padding:"20px 0",opacity:.4,fontSize:13}}>{lang==="en"?"No players yet — add some above":lang==="zh"?"暂无球员，请添加":"暂无球员 No players yet"}</div>:
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,opacity:.5}}>男 {ms.length} · 女 {fs.length}</span>
            {isOwner&&<button onClick={()=>{if(window.confirm("清空全部？"))setPlayers([]);}} style={{fontSize:11,background:"none",border:"none",cursor:"pointer",color:ROSE,opacity:.6}}>{lang==="en"?"Clear All":lang==="zh"?"清空全部":"清空全部 Clear All"}</button>}
          </div>
          {players.map(p=>{
            const mine=p.addedBy===myId||isOwner;
            return <div key={p.id} style={{...S.card,padding:"9px 12px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:p.gender==="M"?SKY_L:ROSE_L,color:p.gender==="M"?SKY:ROSE,fontSize:10,fontWeight:900,flexShrink:0}}>{p.gender}</span>
              <span style={{flex:1,fontWeight:500}}>{p.name}</span>
              <span style={{fontSize:11,color:EMERALD,fontWeight:700}}>Lv{p.skill}</span>
              {mine&&<button onClick={()=>delP(p.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,opacity:.4}}>✕</button>}
              {!mine&&<span style={{fontSize:10,opacity:.3}}>🔒</span>}
            </div>;
          })}
        </div>}
    </div>}

    {tab==="schedule"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
      {isOwner && <>
        {/* Game Mode */}
        <div style={{...S.card,padding:14,display:"flex",flexDirection:"column",gap:8}}>
          <div style={S.lbl}>{lang==="en"?"Game Mode":lang==="zh"?"比赛模式":"比赛模式 Game Mode"}</div>
          {MODES.map(m=>{
            const disabled = m.id!=="mixed" && (m.needM>ms.length||m.needF>fs.length);
            const active = gameMode===m.id;
            return <button key={m.id} onClick={()=>!disabled&&setGameMode(m.id)} disabled={disabled} style={{
              display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:12,
              border:`1px solid ${active?"rgba(22,163,74,.45)":disabled?"rgba(0,0,0,.04)":"rgba(0,0,0,.07)"}`,
              background:active?EMERALD_L:disabled?"rgba(0,0,0,.02)":"rgba(0,0,0,.03)",
              width:"100%",textAlign:"left",cursor:disabled?"not-allowed":"pointer",
              color:active?"#14532d":disabled?"rgba(17,26,17,.25)":"rgba(17,26,17,.6)",
            }}>
              <span style={{fontSize:15}}>{m.icon}</span>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{m.label}</div><div style={{fontSize:10,opacity:.5}}>{m.en}</div></div>
              {active&&<span style={{color:EMERALD}}>✓</span>}
            </button>;
          })}
        </div>
        {/* Match Mode */}
        <div style={{...S.card,padding:14,display:"flex",flexDirection:"column",gap:8}}>
          <div style={S.lbl}>{lang==="en"?"Matching Mode":lang==="zh"?"匹配方式":"匹配方式 Matching Mode"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[{id:"random",icon:"🔀",label:"随机匹配",en:"Random",desc:"最大化覆盖率"},
              {id:"balanced",icon:"⚖️",label:"能力匹配",en:"Skill-Balanced",desc:"相近水平对决"}
            ].map(opt=>(
              <button key={opt.id} onClick={()=>setMatchMode(opt.id)} style={{
                padding:12,borderRadius:12,textAlign:"left",cursor:"pointer",border:"none",
                border:`1px solid ${matchMode===opt.id?"rgba(124,58,237,.4)":"rgba(0,0,0,.07)"}`,
                background:matchMode===opt.id?VIOLET_L:"rgba(0,0,0,.03)",
                color:matchMode===opt.id?VIOLET:"rgba(17,26,17,.6)",
              }}>
                <div style={{fontSize:18}}>{opt.icon}</div>
                <div style={{fontWeight:700,fontSize:13,marginTop:4}}>{opt.label}</div>
                <div style={{fontSize:10,opacity:.6}}>{opt.en}</div>
                <div style={{fontSize:10,opacity:.35,marginTop:2}}>{opt.desc}</div>
              </button>
            ))}
          </div>
        </div>
        <TargetGamesInput value={targetGames} onChange={setTargetGames} />
        <button onClick={gen} disabled={players.length<2} style={{width:"100%",padding:"14px 0",borderRadius:12,fontWeight:900,fontSize:14,border:"none",background:players.length>=2?EMERALD:"rgba(0,0,0,.05)",cursor:players.length>=2?"pointer":"not-allowed",color:players.length>=2?"#fff":"rgba(0,0,0,.25)"}}>{lang==="en"?"🏸 Generate Schedule":lang==="zh"?"🏸 生成赛程":"🏸 生成赛程 Generate Schedule"}</button>
      </>}
      {!isOwner && <div style={{...S.card2,padding:12,textAlign:"center",fontSize:12,opacity:.6}}>{lang==="en"?"Waiting for host to generate…":lang==="zh"?"等待房主生成赛程…":"等待房主生成赛程 Waiting…"}</div>}
      {rounds&&<ResultView rounds={rounds} mode={gameMode} matchMode={matchMode} checked={checked} setChecked={setChecked}
        onRegen={isOwner?gen:null} onAddPlayers={isOwner?addPlayers:null}
        onRemovePlayers={isOwner?removePlayer:null} onMoreRounds={isOwner?moreRounds:null}
        isOwner={isOwner}/>}
      {!rounds&&<div style={{textAlign:"center",padding:"24px 0",opacity:.4,fontSize:13}}>{players.length>=2?(isOwner?lang==="en"?"Tap above to generate schedule":lang==="zh"?"点上方生成赛程":"点上方生成赛程 Tap to generate":"等待房主生成赛程"):"请先添加至少2名球员"}</div>}
    </div>}
  </div>;
}

function App(){
  const [tab,setTab]=useState("basic");
  const [lang,setLang]=useState(()=>{try{return localStorage.getItem("bmt_lang")||"bi";}catch{return "bi";}});
  const [sharedData,setSharedData]=useState(null);

  function changeLang(l){setLang(l);try{localStorage.setItem("bmt_lang",l);}catch{}}

  useEffect(()=>{
    try{
      const hash=window.location.hash;
      if(hash.startsWith("#share=")){
        const encoded=hash.slice(7);
        const data=JSON.parse(decodeURIComponent(escape(atob(encoded))));
        if(data?.rounds&&data?.stats) setSharedData(data);
      }
    }catch{}
  },[]);

  if(sharedData) return (
    <LangContext.Provider value={lang}>
      <SharedView data={sharedData}/>
    </LangContext.Provider>
  );

  return (
    <LangContext.Provider value={lang}>
    <div className="bmt" style={{background:BG,minHeight:"100vh",fontFamily:"'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif"}}>
      <BmtStyles/>
      <div style={{maxWidth:400,margin:"0 auto",padding:"32px 16px 64px"}}>
        {/* Language switcher */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
          <LangSwitcher lang={lang} setLang={changeLang}/>
        </div>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:8}}>🏸</div>
          <h1 style={{fontSize:24,fontWeight:900,margin:0,letterSpacing:-.5}}>
            {lang==="en"?"Badminton Scheduler":"羽毛球赛程安排"}
          </h1>
          <p className="c-dim" style={{fontSize:11,marginTop:4,letterSpacing:3}}>
            {lang==="zh"?"羽毛球赛程 · 覆盖优化":"BADMINTON MATCH SCHEDULER"}
          </p>
        </div>
        {/* Mode toggle */}
        <div style={{display:"flex",gap:4,background:"rgba(0,0,0,0.04)",border:"1px solid rgba(0,0,0,0.05)",padding:4,borderRadius:18,marginBottom:24}}>
          {[["basic", lang==="en"?"⚡ Quick Mode":lang==="zh"?"⚡ 快速模式":"⚡ 快速模式 Quick"],
            ["advanced", lang==="en"?"🎯 Advanced Mode":lang==="zh"?"🎯 高级模式":"🎯 高级模式 Advanced"]
          ].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={tab===id?"c-white":"c-muted"}
              style={{flex:1,padding:"10px 0",borderRadius:14,fontSize:13,fontWeight:900,border:"none",cursor:"pointer",
                background:tab===id?EMERALD:"transparent"}}>{label}</button>
          ))}
        </div>
        {tab==="basic"&&<BasicPanel/>}
        {tab==="advanced"&&<AdvancedPanel/>}
        <div className="c-dim" style={{textAlign:"center",fontSize:9,marginTop:40,letterSpacing:3,textTransform:"uppercase"}}>
          {lang==="en"?"Coverage · Skill Balance · Gender Sub-in":lang==="zh"?"覆盖优化 · 水平匹配 · 性别借位":"覆盖优化 Coverage · 水平匹配 Skill · 性别借位 Sub-in"}
        </div>
      </div>
    </div>
    </LangContext.Provider>
  );
}


/* ═══════════════════════════════════════════════════════════
   BASIC PANEL
═══════════════════════════════════════════════════════════ */

function SharedView({ data }) {
  useForceDarkBg();
  return (
    <div className="bmt" style={{ background: BG, minHeight: "100vh", fontFamily: "'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" }}>
      <BmtStyles />
      <div style={{ maxWidth: 400, margin: "0 auto", padding: "32px 16px 64px" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 36, marginBottom: 6 }}>🏸</div>
          <h1 style={{ fontSize: 20, fontWeight: 900, margin: 0 }}>羽毛球赛程</h1>
          <p className="c-dim" style={{ fontSize: 11, marginTop: 4, letterSpacing: 2 }}>SHARED BADMINTON SCHEDULE</p>
          <div className="c-dark-green" style={{ marginTop: 8, display: "inline-flex", alignItems: "center", gap: 6, background: "rgba(22,163,74,0.10)", border: "1px solid rgba(34,197,94,0.25)", borderRadius: 999, padding: "4px 12px", fontSize: 11 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: EMERALD, display: "inline-block" }}></span>
            只读分享视图 Read-only shared view
          </div>
        </div>
        <ResultView result={data} matchMode={data.matchMode} onRegenerate={null} />
        <div style={{ textAlign: "center", marginTop: 32 }}>
          <a href={window.location.href.split("#")[0]}
            className="c-white"
            style={{ display: "inline-block", padding: "10px 20px", borderRadius: 12, background: EMERALD, fontWeight: 700, fontSize: 14, textDecoration: "none" }}>
            🏸 创建我的赛程 Make My Own
          </a>
        </div>
      </div>
    </div>
  );
}



    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
